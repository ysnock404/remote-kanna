<svg width="1120" height="360" viewBox="0 0 1120 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Kanna remote connection mark</title>
  <desc id="desc">The Kanna icon with a minimal remote connection motif.</desc>
  <defs>
    <radialGradient id="bgPink" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(434 178) rotate(25) scale(360 220)">
      <stop stop-color="#fb7185" stop-opacity="0.22"/>
      <stop offset="0.56" stop-color="#f472b6" stop-opacity="0.09"/>
      <stop offset="1" stop-color="#f472b6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(748 181) rotate(153) scale(340 215)">
      <stop stop-color="#38bdf8" stop-opacity="0.18"/>
      <stop offset="0.62" stop-color="#38bdf8" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#38bdf8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stroke" x1="332" y1="180" x2="788" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fb7185"/>
      <stop offset="0.52" stop-color="#f472b6"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="24" stdDeviation="28" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.96 0 1 0 0 0.45 0 0 1 0 0.70 0 0 0 0.55 0"/>
      <feBlend in2="SourceGraphic" mode="screen"/>
    </filter>
  </defs>

  <rect width="1120" height="360" rx="38" fill="#111113"/>
  <rect width="1120" height="360" rx="38" fill="url(#bgPink)"/>
  <rect width="1120" height="360" rx="38" fill="url(#bgBlue)"/>

  <g opacity="0.38">
    <path d="M296 180C378 117 473 89 560 89C647 89 742 117 824 180" stroke="white" stroke-opacity="0.12" stroke-width="2"/>
    <path d="M296 180C378 243 473 271 560 271C647 271 742 243 824 180" stroke="white" stroke-opacity="0.12" stroke-width="2"/>
    <path d="M356 180H764" stroke="white" stroke-opacity="0.08" stroke-width="2"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="456" y="76" width="208" height="208" rx="52" fill="#09090b" fill-opacity="0.78" stroke="white" stroke-opacity="0.10"/>
    <circle cx="560" cy="180" r="75" fill="#fb7185" opacity="0.14" filter="url(#glow)"/>
    <image href="data:image/png;base64," x="512" y="132" width="96" height="96"/>
  </g>

  <g filter="url(#glow)">
    <path d="M336 180C386 132 454 104 524 94" stroke="url(#stroke)" stroke-width="4" stroke-linecap="round" stroke-dasharray="2 14"/>
    <path d="M584 94C664 105 740 136 784 180" stroke="url(#stroke)" stroke-width="4" stroke-linecap="round" stroke-dasharray="2 14"/>
    <path d="M336 180C386 228 454 256 524 266" stroke="url(#stroke)" stroke-width="4" stroke-linecap="round" stroke-dasharray="2 14"/>
    <path d="M584 266C664 255 740 224 784 180" stroke="url(#stroke)" stroke-width="4" stroke-linecap="round" stroke-dasharray="2 14"/>

    <circle cx="320" cy="180" r="13" fill="#111113" stroke="#fb7185" stroke-width="4"/>
    <circle cx="800" cy="180" r="13" fill="#111113" stroke="#38bdf8" stroke-width="4"/>
    <circle cx="560" cy="82" r="11" fill="#111113" stroke="#f472b6" stroke-width="4"/>
    <circle cx="560" cy="278" r="11" fill="#111113" stroke="#a78bfa" stroke-width="4"/>
  </g>

  <g opacity="0.9">
    <path d="M292 180H244" stroke="#fb7185" stroke-width="4" stroke-linecap="round"/>
    <path d="M828 180H876" stroke="#38bdf8" stroke-width="4" stroke-linecap="round"/>
    <path d="M560 54V34" stroke="#f472b6" stroke-width="4" stroke-linecap="round"/>
    <path d="M560 306V326" stroke="#a78bfa" stroke-width="4" stroke-linecap="round"/>
  </g>
</svg>
